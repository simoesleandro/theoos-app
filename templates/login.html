<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — ThéoOS</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/theoos.css') }}">
</head>
<body class="login-page">
  <main class="login-card panel">
    <div class="logo-mark" style="text-align:center;margin-bottom:var(--space-4)">Théo<em>OS</em></div>
    <h1 class="page-heading" style="font-size:var(--text-xl);text-align:center">Acesso ao painel</h1>
    <p class="page-sub" style="text-align:center;margin-bottom:var(--space-5)">
      Use seu usuário e senha.
    </p>
    <form method="POST" action="{{ url_for('auth.login', next=request.args.get('next')) }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label class="form-label" for="username">Usuário</label>
        <input type="text" id="username" name="username" class="form-input" required autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Senha</label>
        <input type="password" id="password" name="password" class="form-input" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;min-height:44px">Entrar</button>
    </form>
    {% if pin_enabled %}
    <details style="margin-top:16px;text-align:center">
      <summary class="tx-meta" style="cursor:pointer">PIN de emergência</summary>
      <form method="POST" action="{{ url_for('auth.login', next=request.args.get('next')) }}" style="margin-top:10px">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="password" name="pin" class="form-input" placeholder="PIN" inputmode="numeric" autocomplete="off">
        <button type="submit" class="btn btn-ghost btn-sm" style="margin-top:6px">Entrar com PIN</button>
      </form>
    </details>
    {% endif %}
  </main>
</body>
</html>
