name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Lint (ruff check)
        run: ruff check .
      - name: Lint (ruff format check, advisory only)
        run: ruff format --check . || true
      - name: Type check (mypy, advisory only)
        # Pre-existing errors in Phase 0-3 codebase; track but don't fail
        continue-on-error: true
        run: mypy app.py bot.py theoos/
        env:
          MYPY_CACHE_DIR: .mypy_cache
      - name: Run tests
        env:
          SECRET_KEY: test-secret
          GEMINI_API_KEY: test-key
          PYTHONIOENCODING: utf-8
          # Use --collect-only first to surface import-time issues separately
        run: |
          echo "--- collect-only ---"
          pytest tests/ --collect-only -q 2>&1 | tail -20
          echo "--- run tests ---"
          pytest tests/ -v --tb=short 2>&1 | tail -100
